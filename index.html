<!-- 欢迎弹窗（原版） -->
<script>
document.addEventListener("DOMContentLoaded", function () {
    fetch("https://api.kxzjoker.cn/api/ip")
        .then(res => res.json())
        .then(data => {
            if (data.code === 200 && data.data) {
                const msg = `欢迎来自 ${data.data.province} ${data.data.city} 的朋友~`;
                const box = document.createElement("div");
                box.innerText = msg;
                box.style.position = "fixed";
                box.style.top = "20px";
                box.style.right = "-400px";
                box.style.background = "rgba(0,0,0,0.75)";
                box.style.color = "#fff";
                box.style.padding = "10px 20px";
                box.style.borderRadius = "8px";
                box.style.fontSize = "14px";
                box.style.zIndex = "9999";
                box.style.transition = "right 0.5s ease";
                document.body.appendChild(box);
                setTimeout(() => { box.style.right = "20px"; }, 100);
                setTimeout(() => { box.style.right = "-400px"; setTimeout(() => box.remove(), 600); }, 3000);
            }
        })
        .catch(() => {});
});
</script>
